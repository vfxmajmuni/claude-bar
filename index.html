<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: transparent;
      overflow: hidden;
    }

    .wrap {
      padding: 4px;
      -webkit-app-region: drag;
      position: relative;
    }

    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 14px;
      height: 14px;
      cursor: nwse-resize;
      -webkit-app-region: no-drag;
      z-index: 20;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid rgba(255, 255, 255, 0.3);
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 0 0 2px 0;
      transition: border-color .15s;
    }

    .resize-handle:hover::after {
      border-color: rgba(255, 255, 255, 0.75);
    }

    .bar {
      background: rgba(14, 14, 22, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 11px;
      padding: 9px 12px 8px;
      font-family: 'SF Mono', 'Menlo', monospace;
      position: relative;
      opacity: 0.90;
    }

    /* Стандартна червона кнопка закрити */
    .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5f57;
      border: 1px solid #e0443e;
      cursor: pointer;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s;
    }

    .close-btn:hover::after {
      content: '×';
      font-size: 10px;
      color: #7a0000;
      line-height: 1;
      margin-top: -1px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      padding-right: 20px;
      /* відступ від кнопки закрити */
    }

    .left {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .dot.ok {
      background: #4ade80;
    }

    .dot.warn {
      background: #f59e0b;
    }

    .dot.crit {
      background: #ef4444;
      animation: blink .6s infinite;
    }

    .dot.load {
      background: #4f6ef7;
      animation: pulse 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .1
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .label {
      font-size: 9px;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Менший таймер */
    .timer {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .timer.warn {
      color: #f59e0b;
    }

    .timer.crit {
      color: #ef4444;
    }

    .plan-label {
      font-size: 7px;
      color: #ffffff38;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
      min-height: 0;
    }

    .plan-label:empty {
      display: none;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 5px;
      -webkit-app-region: no-drag;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bar-name {
      font-size: 8px;
      color: #ffffff99;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 46px;
      flex-shrink: 0;
    }

    .track {
      flex: 1;
      height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #4f6ef7, #818cf8);
      transition: width .6s ease;
    }

    .fill.warn {
      background: linear-gradient(90deg, #d97706, #fbbf24);
    }

    .fill.crit {
      background: linear-gradient(90deg, #dc2626, #f87171);
    }

    .pct {
      font-size: 8px;
      color: #ffffffaa;
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 7px;
      padding-top: 5px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      -webkit-app-region: no-drag;
    }

    .updated {
      font-size: 8px;
      color: #ffffff55;
    }

    .login-btn {
      font-size: 8px;
      color: #4f6ef7;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'SF Mono', 'Menlo', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0;
    }

    .login-btn:hover {
      color: #818cf8;
    }

    .no-data {
      font-size: 9px;
      color: #ffffff66;
      text-align: center;
      padding: 4px 0;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="bar">
      <div class="close-btn" id="closeBtn"></div>
      <div class="top-row">
        <div class="left">
          <div class="dot load" id="dot"></div>
          <span class="label">Claude</span>
        </div>
        <div class="timer" id="timer">--:--</div>
      </div>
      <div class="plan-label" id="planLabel"></div>
      <div class="bars" id="bars">
        <div class="no-data">Завантаження...</div>
      </div>
      <div class="footer">
        <span class="updated" id="updated">оновлення кожні 2хв</span>
        <button class="login-btn" id="loginBtn">↗ логін</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>

</html>
